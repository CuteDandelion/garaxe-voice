apiVersion: v1
kind: Service
metadata:
  name: garaxe-api
  labels:
    app.kubernetes.io/name: garaxe-api
    app.kubernetes.io/part-of: garaxe
spec:
  selector:
    app.kubernetes.io/name: garaxe-api
  ports:
    - name: http
      port: 3001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garaxe-api
  labels:
    app.kubernetes.io/name: garaxe-api
    app.kubernetes.io/part-of: garaxe
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: garaxe-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garaxe-api
        app.kubernetes.io/part-of: garaxe
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/cutedandelion/garaxe-api:REPLACE_WITH_GIT_SHA
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: garaxe-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: garaxe-secrets
                  key: database-url
            - name: GARAXE_STAGING_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garaxe-secrets
                  key: staging-access-key
          ports:
            - name: http
              containerPort: 3001
          startupProbe:
            httpGet:
              path: /api/live
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "6"
              memory: 12Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: temporary-files
              mountPath: /tmp
      volumes:
        - name: temporary-files
          emptyDir:
            sizeLimit: 1Gi
