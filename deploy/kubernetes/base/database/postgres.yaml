apiVersion: v1
kind: Service
metadata:
  name: garaxe-postgres
  labels:
    app.kubernetes.io/name: garaxe-postgres
    app.kubernetes.io/part-of: garaxe
spec:
  selector:
    app.kubernetes.io/name: garaxe-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garaxe-postgres-data
  labels:
    app.kubernetes.io/name: garaxe-postgres
    app.kubernetes.io/part-of: garaxe
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: garaxe-local-static
  selector:
    matchLabels:
      storage.garaxe.dev/volume: postgres
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garaxe-postgres
  labels:
    app.kubernetes.io/name: garaxe-postgres
    app.kubernetes.io/part-of: garaxe
spec:
  serviceName: garaxe-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garaxe-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garaxe-postgres
        app.kubernetes.io/part-of: garaxe
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: initialize-data-ownership
          image: postgres@sha256:ef463f9f754e6d381d27513b032ace3607532c752427423d344e9fbfd852257a
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "install -d -o 999 -g 999 -m 0700 /var/lib/postgresql/data/pgdata"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres@sha256:ef463f9f754e6d381d27513b032ace3607532c752427423d344e9fbfd852257a
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: garaxe
            - name: POSTGRES_USER
              value: garaxe_app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: garaxe-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "garaxe_app", "-d", "garaxe"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "garaxe_app", "-d", "garaxe"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: garaxe-postgres-data
